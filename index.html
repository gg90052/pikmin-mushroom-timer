<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2d5a1b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="蘑菇計時">
  <meta name="description" content="在皮克敏地圖截圖上標記蘑菇位置並倒數計時">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>皮克敏蘑菇計時器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ── Empty State ── -->
    <div id="empty-state">
      <div class="empty-content">
        <div class="empty-icon">🍄</div>
        <h1>皮克敏蘑菇計時器</h1>
        <p>上傳地圖截圖，在畫面上雙擊標記蘑菇位置，輸入倒數時間後自動計時</p>
        <button id="upload-btn" class="btn-primary">選擇地圖截圖</button>
      </div>
    </div>

    <!-- ── Map View ── -->
    <div id="map-view" class="hidden">
      <div id="toolbar">
        <button id="change-image-btn" class="toolbar-btn">更換圖片</button>
        <span id="marker-count">0 個標記</span>
        <button id="clear-expired-btn" class="toolbar-btn">清除過期</button>
      </div>

      <div id="map-container">
        <img id="map-image" alt="地圖">
        <div id="markers-layer"></div>
      </div>

      <div id="hint">雙擊地圖任意位置新增標記 · 點擊標記可刪除</div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept="image/*" class="hidden">

    <!-- ── Add Marker Modal ── -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <h2>新增蘑菇標記</h2>

        <div class="form-group">
          <label for="marker-title">標題</label>
          <input type="text" id="marker-title" placeholder="例：大蘑菇群" maxlength="20" autocomplete="off">
        </div>

        <div class="form-group">
          <label>剩餘時間</label>
          <div class="time-inputs">
            <div class="time-field">
              <input type="number" id="time-hours" min="0" max="99" value="0" inputmode="numeric">
              <span>時</span>
            </div>
            <div class="time-field">
              <input type="number" id="time-minutes" min="0" max="59" value="30" inputmode="numeric">
              <span>分</span>
            </div>
            <div class="time-field">
              <input type="number" id="time-seconds" min="0" max="59" value="0" inputmode="numeric">
              <span>秒</span>
            </div>
          </div>
          <div class="quick-time-btns">
            <button type="button" class="quick-time-btn" data-seconds="300">+5 分</button>
            <button type="button" class="quick-time-btn" data-seconds="60">+1 分</button>
            <button type="button" class="quick-time-btn" data-seconds="30">+30 秒</button>
          </div>
        </div>

        <div class="modal-actions">
          <button id="modal-cancel" class="btn-secondary">取消</button>
          <button id="modal-save" class="btn-primary">儲存</button>
        </div>
      </div>
    </div>

    <!-- ── Delete Confirm Modal ── -->
    <div id="delete-overlay" class="hidden">
      <div id="delete-modal">
        <h3>刪除標記？</h3>
        <p id="delete-marker-name"></p>
        <div class="modal-actions">
          <button id="delete-cancel" class="btn-secondary">取消</button>
          <button id="delete-confirm" class="btn-danger">刪除</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.warn);
      });
    }
  </script>
</body>
</html>
