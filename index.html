<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2d5a1b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="蘑菇計時">
  <meta name="description" content="在皮克敏地圖截圖上標記蘑菇位置並倒數計時">
  <!-- Open Graph -->
  <meta property="og:title" content="皮克敏蘑菇計時器">
  <meta property="og:description" content="在皮克敏地圖截圖上標記蘑菇位置並倒數計時">
  <meta property="og:image" content="https://pub-0ede5073a9d840e690e0fedd425280b6.r2.dev/pikTimer.jpeg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://pub-0ede5073a9d840e690e0fedd425280b6.r2.dev/pikTimer.jpeg">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>皮克敏蘑菇計時器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ── Empty State ── -->
    <div id="empty-state">
      <div class="empty-content">
        <div class="empty-icon">🍄</div>
        <h1>皮克敏蘑菇計時器</h1>
        <p>上傳地圖截圖，在畫面上<strong>單擊</strong>標記蘑菇位置，輸入倒數時間後自動計時</p>
        <button id="upload-btn" class="btn-primary">選擇地圖截圖</button>

        <div class="ios-guide">
          <div class="ios-guide-title">📱 iOS 加入主畫面教學</div>
          <ol class="ios-guide-steps">
            <li>用 Safari 開啟本頁</li>
            <li>點底部工具列的 <span class="ios-share-icon">分享</span> 按鈕</li>
            <li>選擇「加入主畫面」</li>
            <li>點右上角「新增」完成安裝</li>
          </ol>
          <p class="ios-guide-note">加入主畫面後可全螢幕使用，並支援推播通知</p>
        </div>
      </div>
    </div>

    <!-- ── Map View ── -->
    <div id="map-view" class="hidden">
      <div id="toolbar">
        <button id="change-image-btn" class="toolbar-btn">更換圖片</button>
        <button id="boss-key-btn" class="toolbar-btn boss-key-btn">Boss Key</button>
        <button id="clear-expired-btn" class="toolbar-btn">清除過期</button>
      </div>

      <!-- Boss Key overlay -->
      <div id="boss-overlay"></div>

      <div id="map-container">
        <div id="map-wrapper">
          <img id="map-image" alt="地圖">
          <div id="markers-layer"></div>
        </div>
      </div>

      <div id="hint">點擊地圖任意位置新增標記 · 長按標記可刪除</div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept="image/*" class="hidden">

    <!-- ── Add Marker Modal ── -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <h2>新增蘑菇標記</h2>

        <div class="form-group">
          <label for="marker-title">標題</label>
          <input type="text" id="marker-title" placeholder="例：大蘑菇群" maxlength="20" autocomplete="off">
        </div>

        <div class="form-group">
          <label>剩餘時間</label>
          <div class="time-inputs">
            <div class="time-field">
              <input type="number" id="time-hours" min="0" max="99" value="0" inputmode="numeric">
              <span>時</span>
            </div>
            <div class="time-field">
              <input type="number" id="time-minutes" min="0" max="59" value="0" inputmode="numeric">
              <span>分</span>
            </div>
            <div class="time-field">
              <input type="number" id="time-seconds" min="0" max="59" value="0" inputmode="numeric">
              <span>秒</span>
            </div>
          </div>
          <div class="quick-time-btns">
            <button type="button" class="quick-time-btn" data-seconds="300">+5 分</button>
            <button type="button" class="quick-time-btn" data-seconds="60">+1 分</button>
            <button type="button" class="quick-time-btn" data-seconds="30">+30 秒</button>
          </div>
        </div>

        <div class="notify-section">
          <label class="notify-toggle">
            <div class="notify-toggle-text">
              <span class="notify-toggle-label">倒數結束提醒</span>
              <span class="notify-toggle-desc">倒數歸零時推播</span>
            </div>
            <div class="toggle-switch">
              <input type="checkbox" id="notify-expiry" checked>
              <span class="toggle-track"></span>
            </div>
          </label>

          <label class="notify-toggle">
            <div class="notify-toggle-text">
              <span class="notify-toggle-label">重生提醒</span>
              <span class="notify-toggle-desc">香菇重生前 30 秒推播</span>
            </div>
            <div class="toggle-switch">
              <input type="checkbox" id="notify-grace" checked>
              <span class="toggle-track"></span>
            </div>
          </label>

          <p class="notify-ios-hint">⚠️ iOS 用戶須將本頁加入主畫面後才能接收通知</p>
        </div>

        <div class="modal-actions">
          <button id="modal-cancel" class="btn-secondary">取消</button>
          <button id="modal-save" class="btn-primary">儲存</button>
        </div>
      </div>
    </div>

    <!-- ── Delete Confirm Modal ── -->
    <div id="delete-overlay" class="hidden">
      <div id="delete-modal">
        <h3>刪除標記？</h3>
        <p id="delete-marker-name"></p>
        <div class="modal-actions">
          <button id="delete-cancel" class="btn-secondary">取消</button>
          <button id="delete-confirm" class="btn-danger">刪除</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.warn);
      });
      // 當新版 Service Worker 接管後，自動重新載入頁面以套用更新
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
