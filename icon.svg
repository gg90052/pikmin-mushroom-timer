<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#2d5a1b"/>
  <!-- mushroom cap -->
  <ellipse cx="50" cy="46" rx="32" ry="22" fill="#d46fa0"/>
  <ellipse cx="50" cy="44" rx="32" ry="20" fill="#e88abf"/>
  <!-- cap shine -->
  <ellipse cx="42" cy="38" rx="10" ry="6" fill="#f0a8d0" opacity="0.5"/>
  <!-- dots on cap -->
  <circle cx="38" cy="40" r="5" fill="white" opacity="0.9"/>
  <circle cx="55" cy="36" r="5" fill="white" opacity="0.9"/>
  <circle cx="65" cy="46" r="4" fill="white" opacity="0.9"/>
  <circle cx="44" cy="51" r="3" fill="white" opacity="0.7"/>
  <!-- stem -->
  <rect x="40" y="62" width="20" height="18" rx="6" fill="#f2e0b0"/>
  <rect x="40" y="62" width="20" height="6" rx="3" fill="#dfd0a0"/>
  <!-- skirt/ring -->
  <ellipse cx="50" cy="66" rx="16" ry="4" fill="#e8d0a0"/>
